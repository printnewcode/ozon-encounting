server {
    listen 80;
    server_name jgetbot.store www.jgetbot.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jgetbot.store www.jgetbot.store;

    ssl_certificate /etc/letsencrypt/live/jgetbot.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jgetbot.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location /static/ {
        alias /home/ozon-encounting/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
