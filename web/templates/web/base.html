<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Jget{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #CAFAFE;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .navbar {
            background-color: #55BCC9;
        }
        .navbar-brand, .nav-link {
            color: white !important;
            font-weight: 500;
        }
        .nav-link:hover {
            color: #CAFAFE !important;
        }
        .btn-custom-primary {
            background-color: #FC4445;
            color: white;
            border: none;
            transition: all 0.2s ease-in-out;
        }
        .btn-custom-primary:hover {
            background-color: #e52d2f;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(252, 68, 69, 0.3);
        }
        h1, h2, h3, h4 {
            color: #55BCC9;
            font-weight: 700;
        }
        .card {
            border: 2px solid #97CAEF;
            border-radius: 12px;
            overflow: hidden;
            background-color: white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
        }
        .card-header {
            background-color: #3FEEE6;
            color: #333;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: none;
            padding: 1rem 1.5rem;
        }
        .table-custom {
            margin-bottom: 0;
        }
        .table-custom th {
            background-color: #55BCC9;
            color: white;
            border-bottom: none;
            font-weight: 600;
        }
        .table-custom tbody tr {
            transition: background-color 0.15s ease;
        }
        .table-custom tbody tr:nth-of-type(odd) {
            background-color: #fcfcfc;
        }
        .table-custom tbody tr:hover {
            background-color: #e6f7ff;
        }
        .status-badge {
            font-size: 0.85rem;
            padding: 0.4em 0.8em;
            border-radius: 20px;
        }
        .status-badge.in_stock { background-color: #3FEEE6; color: #1f7a77; border: 1px solid #2bc9c1; }
        .status-badge.in_sale  { background-color: #55BCC9; color: white; }
        .status-badge.sold     { background-color: #FC4445; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'product_list' %}">
                <span style="font-size: 1.3rem; margin-right: 8px;">📦</span> Jget
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'product_list' %}">Товары на складе</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'upload_supply' %}">Загрузка поставки</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'upload_sales' %}">Загрузка продаж</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container pb-5">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
